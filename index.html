    align-items: center;
    height: 100vh;
    font-family: 'Courier New', monospace;

    user-select: none;
  }

    position: relative;

    border-radius: 8px;

  }

    border-radius: 4px;
    background: #16213e;
  }

    left: 0;

    color: #fff;

// ---------- 音频 ----------
const AudioCtx = window.AudioContext || window.webkitAudioContext;
let audioCtx = null;
function initAudio() { if (!audioCtx) audioCtx = new AudioCtx(); }

function playBeep(freq, duration, type = 'square', vol = 0.06) {
  if (!audioCtx) return;
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.type = type;
  osc.frequency.value = freq;
  gain.gain.setValueAtTime(vol, audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
  osc.connect(gain); gain.connect(audioCtx.destination);
  osc.start(); osc.stop(audioCtx.currentTime + duration);
}

function sfxShoot() { playBeep(200, 0.1, 'square', 0.05); }
function sfxHit()   { playBeep(60, 0.2, 'sawtooth', 0.08); }
function sfxExplode(){ playBeep(40, 0.35, 'sawtooth', 0.1); }
function sfxPowerUp(){ playBeep(600, 0.15, 'square', 0.06); playBeep(800, 0.15, 'square', 0.06); }

// ---------- 游戏状态 ----------
let map = [];
let player = null;
let enemies = [];
let bullets = [];
let particles = [];
let powerUps = [];
let score = 0;
let lives = 3;
let level = 1;
let gameRunning = false;
let gamePaused = false;
let gameStarted = false;
let enemySpawnTimer = 0;
let keys = {};
let shakeAmount = 0;
let frameCount = 0;

// ---------- 方向 ----------
const DIR = { UP: 0, RIGHT: 1, DOWN: 2, LEFT: 3 };
const DX = [0, 1, 0, -1];
const DY = [-1, 0, 1, 0];

// ---------- 坦克类 ----------
class Tank {
  constructor(x, y, dir, color, isPlayer = false) {
    this.x = x; this.y = y;
    this.dir = dir;
    this.color = color;
    this.isPlayer = isPlayer;
    this.speed = isPlayer ? 0.08 : 0.03;
    this.size = 0.85; // 相对于 CELL
    this.shootCooldown = 0;
    this.shootDelay = isPlayer ? 15 : 50;
    this.hp = 1;
    this.flashTimer = 0;
    this.aiTimer = 0;
    this.aiShootChance = 0.008;
  }

  collidesAt(nx, ny, ignoreBullets = true) {
    const half = this.size / 2;
    const checkX = nx, checkY = ny;

    // 边界检测
    if (checkX - half < 0 || checkX + half > COLS || checkY - half < 0 || checkY + half > ROWS) return true;

    // 地图碰撞
    const cells = [
      [checkX - half, checkY - half], [checkX + half - 0.01, checkY - half],
      [checkX - half, checkY + half - 0.01], [checkX + half - 0.01, checkY + half - 0.01],
    ];
    for (const [cx, cy] of cells) {
      const col = Math.floor(cx), row = Math.floor(cy);
      if (row >= 0 && row < ROWS && col >= 0 && col < COLS) {
        const tile = map[row][col];
        if (tile === 1 || tile === 2 || tile === 3) return true; // 水也不能通过
      }
    }

    // 与其他坦克碰撞
    const allTanks = this.isPlayer ? enemies : [player, ...enemies];
    for (const other of allTanks) {
      if (!other || other === this) continue;
      const dx = checkX - other.x, dy = checkY - other.y;
      if (Math.abs(dx) < this.size && Math.abs(dy) < this.size) return true;
    }

    return false;
  }

  move(dir) {
    if (dir === undefined) dir = this.dir;
    const nx = this.x + DX[dir] * this.speed;
    const ny = this.y + DY[dir] * this.speed;
    if (!this.collidesAt(nx, ny)) {
      this.x = nx; this.y = ny;
    } else if (!this.collidesAt(nx, this.y)) {
      this.x = nx;
    } else if (!this.collidesAt(this.x, ny)) {
      this.y = ny;
    }
    this.dir = dir;
  }

  shoot() {
    if (this.shootCooldown > 0) return null;
    this.shootCooldown = this.shootDelay;
    const bx = this.x + DX[this.dir] * (this.size / 2 + 0.15);
    const by = this.y + DY[this.dir] * (this.size / 2 + 0.15);
    return new Bullet(bx, by, this.dir, this.isPlayer);
  }

  update() {
    if (this.shootCooldown > 0) this.shootCooldown--;
    if (this.flashTimer > 0) this.flashTimer--;
  }

  draw(ctx) {
    if (this.flashTimer > 0 && this.flashTimer % 4 < 2) return;
    const px = this.x * CELL, py = this.y * CELL;
    const hs = (this.size * CELL) / 2;

    ctx.save();
    ctx.translate(px, py);

    // 炮筒
    const barrelLen = hs + 4;
    ctx.fillStyle = this.color;
    ctx.fillRect(-2, -barrelLen, 4, barrelLen);

    // 身体
    ctx.fillStyle = this.color;
    ctx.fillRect(-hs, -hs, hs * 2, hs * 2);

    // 履带装饰
    ctx.fillStyle = '#111';
    ctx.fillRect(-hs - 1, -hs, 3, hs * 2);
    ctx.fillRect(hs - 2, -hs, 3, hs * 2);

    // 中间圆
    const gradient = ctx.createRadialGradient(0, 0, 2, 0, 0, hs * 0.7);
    gradient.addColorStop(0, '#fff');
    gradient.addColorStop(0.4, this.color);
    gradient.addColorStop(1, '#222');
    ctx.fillStyle = gradient;
    ctx.beginPath();
    ctx.arc(0, 0, hs * 0.6, 0, Math.PI * 2);
    ctx.fill();

    // 玩家标记
    if (this.isPlayer) {
      ctx.fillStyle = '#ffd700';
      ctx.beginPath();
      ctx.arc(0, 0, 3, 0, Math.PI * 2);
      ctx.fill();
    }

    ctx.restore();
  }
}

// ---------- 子弹类 ----------
class Bullet {
  constructor(x, y, dir, isPlayerBullet) {
    this.x = x; this.y = y;
    this.dir = dir;
    this.isPlayerBullet = isPlayerBullet;
    this.speed = 0.12;
    this.alive = true;
  }

  update() {
    this.x += DX[this.dir] * this.speed;
    this.y += DY[this.dir] * this.speed;

    // 边界
    if (this.x < 0 || this.x > COLS || this.y < 0 || this.y > ROWS) { this.alive = false; return; }

    // 地图
    const col = Math.floor(this.x), row = Math.floor(this.y);
    if (row >= 0 && row < ROWS && col >= 0 && col < COLS) {
      const tile = map[row][col];
      if (tile === 1) { // 砖墙 - 破坏
        map[row][col] = 0;
        this.alive = false;
        spawnParticles(col + 0.5, row + 0.5, '#c9a87c', 6);
        sfxHit();
        return;
      }
      if (tile === 2) { // 钢铁
        this.alive = false;
        spawnParticles(col + 0.5, row + 0.5, '#888', 4);
        sfxHit();
        return;
      }
      // 水: 子弹可通过
    }

    // 碰撞检测
    if (this.isPlayerBullet) {
      for (const enemy of enemies) {
        const dx = this.x - enemy.x, dy = this.y - enemy.y;
        if (Math.abs(dx) < enemy.size / 2 + 0.15 && Math.abs(dy) < enemy.size / 2 + 0.15) {
          this.alive = false;
          enemy.hp--;
          enemy.flashTimer = 8;
          if (enemy.hp <= 0) {
            destroyEnemy(enemy);
          }
          break;
        }
      }
    } else {
      const dx = this.x - player.x, dy = this.y - player.y;
      if (Math.abs(dx) < player.size / 2 + 0.15 && Math.abs(dy) < player.size / 2 + 0.15) {
        this.alive = false;
        playerHit();
      }
    }
  }

  draw(ctx) {
    ctx.fillStyle = this.isPlayerBullet ? '#ffd700' : '#ff4444';
    ctx.shadowColor = this.isPlayerBullet ? '#ffd700' : '#ff4444';
    ctx.shadowBlur = 6;
    ctx.fillRect(this.x * CELL - 2, this.y * CELL - 2, 5, 5);
    ctx.shadowBlur = 0;
  }
}

// ---------- 粒子 ----------
function spawnParticles(x, y, color, count) {
  for (let i = 0; i < count; i++) {
    particles.push({
      x, y,
      vx: (Math.random() - 0.5) * 0.08,
      vy: (Math.random() - 0.5) * 0.08,
      life: 20 + Math.random() * 15,
      color,
    });
  }
}

// ---------- 道具 ----------
class PowerUp {
  constructor(x, y, type) {
    this.x = x; this.y = y;
    this.type = type; // 'star' | 'shield' | 'freeze' | 'bomb'
    this.timer = 600;
  }

  update() { this.timer--; return this.timer > 0; }

  draw(ctx) {
    const px = this.x * CELL, py = this.y * CELL;
    const pulse = Math.sin(frameCount * 0.1) * 0.2 + 0.8;
    ctx.save();
    ctx.globalAlpha = this.timer < 120 ? (this.timer % 20 < 10 ? 1 : 0.3) : 1;

    ctx.fillStyle = { star: '#ffd700', shield: '#4fc3f7', freeze: '#81c784', bomb: '#ff8a65' }[this.type];
    ctx.shadowColor = ctx.fillStyle;
    ctx.shadowBlur = 10 * pulse;
    ctx.fillRect(px - 8 * pulse, py - 8 * pulse, 16 * pulse, 16 * pulse);

    ctx.fillStyle = '#fff';
    ctx.font = '14px Arial';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    const icon = { star: '⭐', shield: '🛡️', freeze: '❄️', bomb: '💣' }[this.type];
    ctx.fillText(icon, px, py);

    ctx.restore();
  }
}

// ---------- 游戏函数 ----------
function destroyEnemy(enemy) {
  spawnParticles(enemy.x, enemy.y, enemy.color, 14);
  sfxExplode();
  const idx = enemies.indexOf(enemy);
  if (idx >= 0) enemies.splice(idx, 1);
  score += 100;
  shakeAmount = Math.max(shakeAmount, 3);

  // 随机掉落道具
  if (Math.random() < 0.2) {
    const types = ['star', 'shield', 'freeze', 'bomb'];
    powerUps.push(new PowerUp(enemy.x, enemy.y, types[Math.floor(Math.random() * types.length)]));
  }
}

function playerHit() {
  if (player.flashTimer > 0) return; // 无敌帧
  lives--;
  player.flashTimer = 60;
  player.x = Math.floor(COLS / 2);
  player.y = ROWS - 2;
  player.dir = DIR.UP;
  shakeAmount = Math.max(shakeAmount, 6);
  spawnParticles(player.x, player.y, '#e94560', 20);
  sfxExplode();
  if (lives <= 0) gameOver();
}

function gameOver() {
  gameRunning = false;
  document.getElementById('final-score').textContent = score;
  document.getElementById('game-over').classList.add('visible');
}

function collectPowerUp(pu) {
  sfxPowerUp();
  switch (pu.type) {
    case 'star': score += 300; break;
    case 'shield': player.flashTimer = 180; break;
    case 'freeze':
      enemies.forEach(e => { e.speed = 0.005; setTimeout(() => { if (e) e.speed = 0.03; }, 5000); });
      break;
    case 'bomb':
      enemies.forEach(e => destroyEnemy(e));
      score += enemies.length * 100;
      break;
  }
}

function initLevel(lvl) {
  const tmplIdx = (lvl - 1) % MAP_TEMPLATES.length;
  map = MAP_TEMPLATES[tmplIdx].map(row => [...row]);

  player = new Tank(Math.floor(COLS / 2), ROWS - 2, DIR.UP, '#4fc3f7', true);
  enemies = [];
  bullets = [];
  particles = [];
  powerUps = [];
  enemySpawnTimer = 0;

  const enemyCount = 3 + lvl;
  for (let i = 0; i < enemyCount; i++) {
    spawnEnemy();
  }
}

function spawnEnemy() {
  const spawns = [
    [1, 1], [COLS - 2, 1], [1, ROWS - 2],
  ];
  const colors = ['#ff5252', '#ff9800', '#e040fb', '#69f0ae'];
  let sx, sy;
  // 尝试找个空位
  for (let attempt = 0; attempt < 30; attempt++) {
    sx = Math.random() * (COLS - 4) + 2;
    sy = Math.random() * (ROWS / 3) + 1;
    const tank = new Tank(sx, sy, DIR.DOWN, colors[Math.floor(Math.random() * colors.length)]);
    if (!tank.collidesAt(sx, sy)) {
      enemies.push(tank);
      return;
    }
  }
  // fallback
  const [fsx, fsy] = spawns[Math.floor(Math.random() * spawns.length)];
  const enemy = new Tank(fsx, fsy, DIR.DOWN, colors[Math.floor(Math.random() * colors.length)]);
  enemies.push(enemy);
}

function restartGame() {
  score = 0;
  lives = 3;
  level = 1;
  gameRunning = true;
  gamePaused = false;
  gameStarted = true;
  document.getElementById('game-over').classList.remove('visible');
  document.getElementById('start-screen').classList.add('hidden');
  initLevel(1);
  updateUI();
}

// ---------- 主循环 ----------
function update() {
  if (!gameRunning || gamePaused) return;
  frameCount++;

  // 玩家
  if (player) {
    if (keys['ArrowUp'] || keys['KeyW']) player.move(DIR.UP);
    else if (keys['ArrowDown'] || keys['KeyS']) player.move(DIR.DOWN);
    else if (keys['ArrowLeft'] || keys['KeyA']) player.move(DIR.LEFT);
    else if (keys['ArrowRight'] || keys['KeyD']) player.move(DIR.RIGHT);

    if (keys['Space']) {
      const bullet = player.shoot();
      if (bullet) { bullets.push(bullet); sfxShoot(); }
    }

    player.update();

    // 玩家捡道具
    for (let i = powerUps.length - 1; i >= 0; i--) {
      const pu = powerUps[i];
      const dx = player.x - pu.x, dy = player.y - pu.y;
      if (Math.abs(dx) < 0.6 && Math.abs(dy) < 0.6) {
        collectPowerUp(pu);
        powerUps.splice(i, 1);
      }
    }
  }

  // 敌人
  for (const enemy of enemies) {
    // 简单AI
    enemy.aiTimer++;
    if (enemy.aiTimer > 40 + Math.random() * 40) {
      enemy.aiTimer = 0;
      // 随机决定转向
      if (Math.random() < 0.3) {
        enemy.dir = Math.floor(Math.random() * 4);
      } else {
        // 朝向玩家
        const dx = player.x - enemy.x, dy = player.y - enemy.y;
        if (Math.abs(dx) > Math.abs(dy)) enemy.dir = dx > 0 ? DIR.RIGHT : DIR.LEFT;
        else enemy.dir = dy > 0 ? DIR.DOWN : DIR.UP;
      }
    }

    enemy.move(enemy.dir);
    enemy.update();

    // 敌人射击
    if (Math.random() < enemy.aiShootChance) {
      const bullet = enemy.shoot();
      if (bullet) bullets.push(bullet);
    }
  }

  // 子弹
  for (let i = bullets.length - 1; i >= 0; i--) {
    bullets[i].update();
    if (!bullets[i].alive) bullets.splice(i, 1);
  }

  // 粒子
  for (let i = particles.length - 1; i >= 0; i--) {
    particles[i].x += particles[i].vx;
    particles[i].y += particles[i].vy;
    particles[i].life--;
    if (particles[i].life <= 0) particles.splice(i, 1);
  }

  // 道具过期
  for (let i = powerUps.length - 1; i >= 0; i--) {
    if (!powerUps[i].update()) powerUps.splice(i, 1);
  }

  // 敌人生成
  enemySpawnTimer++;
  if (enemySpawnTimer > 600 && enemies.length < 5) {
    enemySpawnTimer = 0;
    spawnEnemy();
  }

  // 震屏衰减
  shakeAmount *= 0.85;
  if (shakeAmount < 0.1) shakeAmount = 0;

  // 过关检测
  if (enemies.length === 0 && enemySpawnTimer > 240) {
    level++;
    score += 500;
    initLevel(level);
  }

  updateUI();
}

function updateUI() {
  document.getElementById('score').textContent = score;
  document.getElementById('lives').textContent = lives;
  document.getElementById('level').textContent = level;
}

function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  // 震屏偏移
  let sx = 0, sy = 0;
  if (shakeAmount > 0) {
    sx = (Math.random() - 0.5) * shakeAmount * 2;
    sy = (Math.random() - 0.5) * shakeAmount * 2;
  }

  ctx.save();
  ctx.translate(sx, sy);

  // 绘制地图
  for (let row = 0; row < ROWS; row++) {
    for (let col = 0; col < COLS; col++) {
      const px = col * CELL, py = row * CELL;
      switch (map[row][col]) {
        case 1: // 砖墙
          ctx.fillStyle = '#c9a87c';
          ctx.fillRect(px + 1, py + 1, CELL - 2, CELL - 2);
          ctx.fillStyle = '#a0825a';
          ctx.fillRect(px + 1, py + 1, CELL - 2, 2);
          ctx.fillRect(px + 1, py + 1, 2, CELL - 2);
          ctx.fillStyle = '#8b6f47';
          ctx.fillRect(px + 1, py + CELL / 2 - 1, CELL - 2, 2);
          ctx.fillRect(px + CELL / 2 - 1, py + 1, 2, CELL - 2);
          break;
        case 2: // 钢铁
          ctx.fillStyle = '#78909c';
          ctx.fillRect(px, py, CELL, CELL);
          ctx.fillStyle = '#546e7a';
          ctx.fillRect(px + 2, py + 2, CELL - 4, CELL - 4);
          ctx.fillStyle = '#90a4ae';
          ctx.fillRect(px, py, CELL, 3);
          ctx.fillRect(px, py, 3, CELL);
          break;
        case 3: // 水
          const waterGrad = ctx.createLinearGradient(px, py, px + CELL, py + CELL);
          waterGrad.addColorStop(0, '#1565c0');
          waterGrad.addColorStop(0.5, '#42a5f5');
          waterGrad.addColorStop(1, '#1565c0');
          ctx.fillStyle = waterGrad;
          ctx.fillRect(px, py, CELL, CELL);
          ctx.fillStyle = 'rgba(255,255,255,0.2)';
          ctx.fillRect(px + 2, py + frameCount % CELL, CELL - 4, 3);
          break;
        default:
          // 地面
          ctx.fillStyle = '#1a1a2e';
          ctx.fillRect(px, py, CELL, CELL);
          ctx.fillStyle = 'rgba(255,255,255,0.02)';
          ctx.fillRect(px, py, CELL, CELL);
      }
    }
  }

  // 道具
  for (const pu of powerUps) pu.draw(ctx);

  // 粒子
  for (const p of particles) {
    ctx.fillStyle = p.color;
    ctx.globalAlpha = p.life / 35;
    ctx.fillRect(p.x * CELL - 2, p.y * CELL - 2, 4, 4);
    ctx.globalAlpha = 1;
  }

  // 玩家
  if (player) player.draw(ctx);

  // 敌人
  for (const enemy of enemies) enemy.draw(ctx);

  // 子弹
  for (const bullet of bullets) bullet.draw(ctx);

  ctx.restore();

  // 暂停覆盖
  if (gamePaused) {
    ctx.fillStyle = 'rgba(0,0,0,0.5)';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = '#e94560';
    ctx.font = '36px "Courier New"';
    ctx.textAlign = 'center';
    ctx.fillText('⏸ 已暂停', canvas.width / 2, canvas.height / 2 - 10);
    ctx.fillStyle = '#aaa';
    ctx.font = '16px "Courier New"';
    ctx.fillText('按 P 继续', canvas.width / 2, canvas.height / 2 + 25);
  }
}

function loop() {
  update();
  draw();
  requestAnimationFrame(loop);
}

// ---------- 输入处理 ----------
document.addEventListener('keydown', (e) => {
  keys[e.code] = true;
  if (e.code === 'KeyP' && gameStarted) {
    gamePaused = !gamePaused;
  }
  if (e.code === 'Space') {
    e.preventDefault();
    if (!gameStarted && !gameRunning) startGame();
  }
});

document.addEventListener('keyup', (e) => {
  keys[e.code] = false;
});

document.getElementById('start-btn').addEventListener('click', () => {
  initAudio();
  startGame();
});

document.getElementById('restart-btn').addEventListener('click', () => {
  restartGame();
});

function startGame() {
  initAudio();
  score = 0;
  lives = 3;
  level = 1;
  gameRunning = true;
  gamePaused = false;
  gameStarted = true;
  document.getElementById('game-over').classList.remove('visible');
  document.getElementById('start-screen').classList.add('hidden');
  initLevel(1);
  updateUI();
}

// ---------- 移动端触摸控制 ----------
let touchState = { active: false, startX: 0, startY: 0, dir: null, shooting: false };

canvas.addEventListener('touchstart', (e) => {
  e.preventDefault();
  initAudio();
  if (!gameStarted && !gameRunning) { startGame(); return; }
  const rect = canvas.getBoundingClientRect();
  const touch = e.touches[0];
  touchState.active = true;
  touchState.startX = touch.clientX - rect.left;
  touchState.startY = touch.clientY - rect.top;

  // 判断点击区域：右下角为射击区
  if (touchState.startX > canvas.width * 0.7 && touchState.startY > canvas.height * 0.7) {
    touchState.shooting = true;
  }
}, { passive: false });

canvas.addEventListener('touchmove', (e) => {
  e.preventDefault();
  if (!touchState.active || touchState.shooting) return;
  const rect = canvas.getBoundingClientRect();
  const touch = e.touches[0];
  const dx = touch.clientX - rect.left - touchState.startX;
  const dy = touch.clientY - rect.top - touchState.startY;
  if (Math.abs(dx) > 15 || Math.abs(dy) > 15) {
    if (Math.abs(dx) > Math.abs(dy)) {
      keys['ArrowLeft'] = false; keys['ArrowRight'] = false; keys['ArrowUp'] = false; keys['ArrowDown'] = false;
      if (dx > 0) keys['ArrowRight'] = true;
      else keys['ArrowLeft'] = true;
    } else {
      keys['ArrowLeft'] = false; keys['ArrowRight'] = false; keys['ArrowUp'] = false; keys['ArrowDown'] = false;
      if (dy > 0) keys['ArrowDown'] = true;
      else keys['ArrowUp'] = true;
    }
  }
}, { passive: false });

canvas.addEventListener('touchend', (e) => {
  e.preventDefault();
  keys['ArrowLeft'] = false; keys['ArrowRight'] = false;
  keys['ArrowUp'] = false; keys['ArrowDown'] = false;
  keys['Space'] = false;
  touchState.active = false;
  touchState.shooting = false;
}, { passive: false });

// 自动射击
setInterval(() => {
  if (touchState.shooting && gameRunning) keys['Space'] = true;
  else if (!touchState.shooting) keys['Space'] = false;
}, 100);

// ---------- 启动 ----------
map = MAP_TEMPLATES[0].map(row => [...row]);
loop();
updateUI();
</script>
</body>
